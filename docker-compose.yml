services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dtm_quiz_bot}
      POSTGRES_USER: ${POSTGRES_USER:-dtm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dtm_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dtm_user} -d ${POSTGRES_DB:-dtm_quiz_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m bot.main"
    volumes:
      - ./data:/app/data:ro
      - ./materials:/app/materials:ro

volumes:
  postgres_data:
